name: Test library-backend

on:
  # push:
  #   branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install library-backend dependencies
        working-directory: library-backend
        run: npm install

      - name: Install test dependencies
        working-directory: tests
        run: npm install

      - name: Run tests
        working-directory: tests
        run: npm test
